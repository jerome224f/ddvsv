<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <!-- Vibrant Crimson to Scarlet Gradient -->
    <linearGradient id="vyesGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#991B1B" />
      <stop offset="30%" stop-color="#DC2626" />
      <stop offset="70%" stop-color="#EF4444" />
      <stop offset="100%" stop-color="#F87171" />
    </linearGradient>
    
    <!-- Smooth Glow Shadow -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <g filter="url(#glow)">
    <!-- Base stylized "V" with sharp geometric corners -->
    <path d="M 75 150 
             L 135 150 
             L 250 350 
             L 365 150 
             L 425 150 
             L 280 440 
             L 220 440 
             Z" 
          fill="url(#vyesGrad)" />

    <!-- Left side connection nodes & paths -->
    <!-- Lower node -->
    <circle cx="70" cy="275" r="14" fill="url(#vyesGrad)" />
    <!-- Upper node -->
    <circle cx="70" cy="335" r="14" fill="url(#vyesGrad)" />
    <!-- Connector paths -->
    <path d="M 70 275 L 120 310" stroke="url(#vyesGrad)" stroke-width="12" stroke-linecap="round" />
    <path d="M 70 335 L 120 310" stroke="url(#vyesGrad)" stroke-width="12" stroke-linecap="round" />
    <path d="M 120 310 L 190 230" stroke="url(#vyesGrad)" stroke-width="12" stroke-linecap="round" />
    
    <!-- Central dynamic rising arrow (pointing up-right) -->
    <path d="M 180 320 
             L 280 200 
             M 240 200 
             L 280 200 
             L 280 240" 
          stroke="url(#vyesGrad)" 
          stroke-width="16" 
          stroke-linecap="round" 
          stroke-linejoin="round" 
          fill="none" />

    <!-- Right wing accentuating rising arrow -->
    <path d="M 290 280 
             L 430 60 
             L 320 120 
             L 370 210 
             Z" 
          fill="url(#vyesGrad)" />
          
    <!-- Swooshing bottom dynamic line -->
    <path d="M 140 390 
             Q 250 400 370 270 
             L 360 360 
             Z" 
          fill="url(#vyesGrad)" />
  </g>
</svg>
